<!DOCTYPE html>
<html>
<head>
    <title>Label QC Checker</title>
</head>
<body>

<h1>Label QC Checker</h1>

<form
method="POST"
action="/compare"
enctype="multipart/form-data">

    <p>Approval Label</p>
    <input
    type="file"
    name="approval"
    required>

    <br><br>

    <p>Sample Label</p>
    <input
    type="file"
    name="sample"
    required>

    <br><br>

    <button type="submit">
        Compare
    </button>

</form>

</body>
</html>
