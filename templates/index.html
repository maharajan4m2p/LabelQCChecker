<!DOCTYPE html>
<html>
<head>
    <title>Label QC Checker</title>

    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:Segoe UI,sans-serif;
        }

        body{
            background:linear-gradient(
                135deg,
                #0f172a,
                #1e3a8a
            );
            min-height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
            padding:20px;
        }

        .container{
            background:white;
            width:100%;
            max-width:700px;
            border-radius:20px;
            padding:40px;
            box-shadow:0 10px 30px rgba(0,0,0,.25);
        }

        .header{
            display:flex;
            justify-content:space-between;
            align-items:center;
            margin-bottom:30px;
        }

        .title{
            font-size:30px;
            font-weight:bold;
            color:#1e3a8a;
        }

        .owner{
            background:#1e3a8a;
            color:white;
            padding:10px 18px;
            border-radius:25px;
            font-weight:bold;
        }

        .subtitle{
            text-align:center;
            color:#666;
            margin-bottom:30px;
        }

        .card{
            background:#f8fafc;
            border:2px solid #e2e8f0;
            border-radius:15px;
            padding:20px;
            margin-bottom:20px;
        }

        label{
            display:block;
            font-weight:bold;
            margin-bottom:10px;
            color:#1e293b;
        }

        input[type="file"]{
            width:100%;
            padding:10px;
            border:1px solid #ccc;
            border-radius:8px;
            background:white;
        }

        .btn{
            width:100%;
            padding:15px;
            background:#2563eb;
            color:white;
            border:none;
            border-radius:12px;
            font-size:18px;
            font-weight:bold;
            cursor:pointer;
        }

        .btn:hover{
            background:#1d4ed8;
        }

        .features{
            margin-top:25px;
        }

        .features ul{
            padding-left:20px;
        }

        .features li{
            margin-bottom:8px;
            color:#444;
        }

    </style>
</head>

<body>

    <div class="container">

        <div class="header">

            <div class="title">
                Label QC Checker
            </div>

            <div class="owner">
                Maharajan
            </div>

        </div>

        <div class="subtitle">
            Upload Approval Label and Sample Label for Automated Quality Check
        </div>

        <form
            action="/compare"
            method="POST"
            enctype="multipart/form-data"
        >

            <div class="card">

                <label>
                    Approval Label Image
                </label>

                <input
                    type="file"
                    name="approval"
                    required
                >

            </div>

            <div class="card">

                <label>
                    Sample Label Image
                </label>

                <input
                    type="file"
                    name="sample"
                    required
                >

            </div>

            <button
                type="submit"
                class="btn"
            >
                Compare Labels
            </button>

        </form>

        <div class="features">

            <h3>
                Features
            </h3>

            <ul>
                <li>OCR Text Extraction</li>
                <li>Approval Probability Calculation</li>
                <li>Missing Field Detection</li>
                <li>Extra Field Detection</li>
                <li>Matched Field Analysis</li>
                <li>QC Dashboard Report</li>
            </ul>

        </div>

    </div>

</body>
</html>
